# ServiceNow Enterprise App Configuration
# Configuration for integrating ServiceNow with Azure Entra ID
# Gallery App ID: c4b0b3e8-2e1f-4c7a-9f3a-1b2c3d4e5f6g (Example ServiceNow ID)

metadata:
  name: "servicenow-itsm"
  description: "ServiceNow IT Service Management Platform"
  version: "1.0.0"
  tags:
    - "servicenow"
    - "itsm"
    - "saml"
    - "ticketing"

application:
  # ServiceNow Gallery Application Template ID (example)
  galleryAppId: "c4b0b3e8-2e1f-4c7a-9f3a-1b2c3d4e5f6g"
  displayName: "ServiceNow ITSM"
  homepage: "https://contoso.service-now.com"
  notes: "ServiceNow ITSM platform for incident and change management"

assignment:
  assignmentRequired: true
  visibleToUsers: true
  
  users:
    - userPrincipalName: "it.manager@contoso.com"
      role: "Admin"
    - userPrincipalName: "helpdesk.agent@contoso.com"
      role: "User"
  
  groups:
    - displayName: "IT Support Team"
      role: "User"
    - displayName: "IT Managers"
      role: "Admin"

sso:
  ssoMode: "saml"
  
  saml:
    identifier: "https://contoso.service-now.com/nav_to.do"
    replyUrl: "https://contoso.service-now.com/navpage.do"
    signOnUrl: "https://contoso.service-now.com/navpage.do"
    nameIdFormat: "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
    
    attributes:
      - name: "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
        source: "user.mail"
      - name: "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
        source: "user.userprincipalname"
      - name: "first_name"
        source: "user.givenname"
      - name: "last_name"
        source: "user.surname"

provisioning:
  enabled: false
  mode: "manual"

notifications:
  emailAddresses:
    - "it-admin@contoso.com"
    - "security-team@contoso.com"